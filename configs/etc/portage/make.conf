# These settings were set by the catalyst build script that automatically
# built this stage.
# Please consult /usr/share/portage/config/make.conf.example for a more
# detailed example.
# compile settings
COMMON_FLAGS="-O2 -pipe -march=native -mtune=native"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

RUSTFLAGS="${RUSTFLAGS} -C target-cpu=native"

MAKEOPTS="-j32 -l33"
# NOTE: This stage was built with the bindist USE flag enabled

# This sets the language of build output to English.
# Please keep this setting intact when reporting bugs.
LC_MESSAGES=C.UTF-8

# license
ACCEPT_LICENSE="-* @FREE @BINARY-REDISTRIBUTABLE"

# bleeding edge change to ="amd64" for stable
ACCEPT_KEYWORDS="~amd64"

#mirrors
GENTOO_MIRRORS="https://mirror.leaseweb.com/gentoo/ \
    https://mirrors.kernel.org/gentoo/ \
    https://mirror.cs.odu.edu/"

USE_POS="X elogind dbus gdk-pixbuf zstd wayland flatpak opengl libnotify pipewire vaapi wifi"
USE_NEG="-initramfs -dist-kernel -systemd  -deprecated"

USE="$USE_POS $USE_NEG"

LUA_SINGLE_TARGET="lua5-4"
